name: CLI Release

on:
  push:
    branches:
      - main
    tags:
      - 'cli-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-cli:
    name: Build and Release CLI
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/cli-v')
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@0aaccfd150d50ccaeb58ebd88d36e91967a5f35b # v5.4.0
        with:
          go-version: '1.23'
          cache: false

      - name: Initialize go.mod
        run: |
          go mod init ssmready
          go mod tidy

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/cli-v}" >> $GITHUB_OUTPUT

      - name: Build CLI for multiple platforms
        run: |
          mkdir -p dist
          
          # macOS ARM64
          GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 go build \
            -ldflags="-s -w -X main.version=${{ steps.version.outputs.VERSION }}" \
            -o dist/ansible-ssm-darwin-arm64 \
            ./cmd/ansible-ssm
          
          # macOS AMD64
          GOOS=darwin GOARCH=amd64 CGO_ENABLED=0 go build \
            -ldflags="-s -w -X main.version=${{ steps.version.outputs.VERSION }}" \
            -o dist/ansible-ssm-darwin-amd64 \
            ./cmd/ansible-ssm
          
          # Linux ARM64
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build \
            -ldflags="-s -w -X main.version=${{ steps.version.outputs.VERSION }}" \
            -o dist/ansible-ssm-linux-arm64 \
            ./cmd/ansible-ssm
          
          # Linux AMD64
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build \
            -ldflags="-s -w -X main.version=${{ steps.version.outputs.VERSION }}" \
            -o dist/ansible-ssm-linux-amd64 \
            ./cmd/ansible-ssm

      - name: Generate checksums
        run: |
          cd dist
          sha256sum ansible-ssm-* > ansible-ssm_${{ steps.version.outputs.VERSION }}_SHA256SUMS

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/ansible-ssm-darwin-arm64
            dist/ansible-ssm-darwin-amd64
            dist/ansible-ssm-linux-arm64
            dist/ansible-ssm-linux-amd64
            dist/ansible-ssm_${{ steps.version.outputs.VERSION }}_SHA256SUMS
          body: |
            ## ansible-ssm CLI ${{ steps.version.outputs.VERSION }}
            
            Standalone CLI tool for running Ansible playbooks on EC2 instances via AWS Systems Manager.
            
            ### Installation
            
            Download the appropriate binary for your platform and make it executable:
            
            ```bash
            # macOS ARM64
            curl -LO https://github.com/${{ github.repository }}/releases/download/cli-v${{ steps.version.outputs.VERSION }}/ansible-ssm-darwin-arm64
            chmod +x ansible-ssm-darwin-arm64
            sudo mv ansible-ssm-darwin-arm64 /usr/local/bin/ansible-ssm
            
            # Linux AMD64
            curl -LO https://github.com/${{ github.repository }}/releases/download/cli-v${{ steps.version.outputs.VERSION }}/ansible-ssm-linux-amd64
            chmod +x ansible-ssm-linux-amd64
            sudo mv ansible-ssm-linux-amd64 /usr/local/bin/ansible-ssm
            ```
            
            ### Verify checksums
            
            ```bash
            curl -LO https://github.com/${{ github.repository }}/releases/download/cli-v${{ steps.version.outputs.VERSION }}/ansible-ssm_${{ steps.version.outputs.VERSION }}_SHA256SUMS
            sha256sum -c ansible-ssm_${{ steps.version.outputs.VERSION }}_SHA256SUMS
            ```
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
